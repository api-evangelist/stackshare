aid: stackshare
url: 
  https://raw.githubusercontent.com/api-evangelist/stackshare/refs/heads/main/apis.yml
apis:
  - aid: stackshare:stackshare-graphql-api
    name: StackShare GraphQL API
    tags:
      - Developer Tools
      - Tech Stacks
      - Software Discovery
    baseURL: https://api.stackshare.io/graphql
    humanURL: https://docs.stackshare.io/
    properties:
      - url: https://docs.stackshare.io/
        type: Documentation
      - url: https://docs.stackshare.io/reference/getting-started
        type: GettingStarted
      - url: https://docs.stackshare.io/reference/authentication
        type: Authentication
      - url: https://docs.stackshare.io/docs/the-graphql-endpoint
        type: GraphQL
      - url: https://docs.stackshare.io/docs/enrichment
        type: Documentation
      - url: https://docs.stackshare.io/docs/tools
        type: Documentation
    description: >-
      The StackShare GraphQL API provides programmatic access to StackShare's database
      of developer tools and company tech stacks. It exposes four primary capability
      areas: Leads (find companies using specific tools), Enrichment (retrieve the
      full tech stack for a given company), Tools (query metadata about a technology
      such as description and website URL), and Search (look up companies and retrieve
      basic company details).
